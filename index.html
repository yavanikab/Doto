<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&family=Noto+Sans+Thai+Looped:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Doto</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #1a1a1a;
        animation: splash-fade 0.25s ease-out 1.2s forwards;
        pointer-events: none;
      }

      #splash-icon {
        width: 72px;
        height: 72px;
        opacity: 0;
        animation: splash-icon 1.1s ease-out forwards;
      }

      #splash-text {
        font-family:
          'Space Mono',
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--splash-text-color, #e0e0e0);
        opacity: 0;
        animation: splash-text 1.1s ease-out forwards;
      }

      @keyframes splash-icon {
        0% {
          opacity: 0;
          transform: scale(0.75);
          filter: brightness(0.5);
        }
        20% {
          opacity: 1;
          transform: scale(1.05);
          filter: brightness(1);
        }
        35% {
          opacity: 1;
          transform: scale(1.08);
          filter: brightness(1.8);
        }
        50% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1);
        }
      }

      @keyframes splash-text {
        0% {
          opacity: 0;
          transform: translateY(8px);
        }
        20% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes splash-fade {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-icon" src="/icon.png" alt="Doto" />
      <span id="splash-text">Doto</span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
